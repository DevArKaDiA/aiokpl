name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Install nox
        run: uv pip install --system nox
      - name: Run lint & typecheck
        run: nox -s lint typecheck

  tests:
    name: Tests (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python }}
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Install nox
        run: uv pip install --system nox
      - name: Run tests
        run: nox -s tests-${{ matrix.python }}
      - name: Upload coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-${{ matrix.python }}
          path: |
            coverage.xml
            .coverage.*
          if-no-files-found: ignore
          include-hidden-files: true

  integration:
    name: Integration (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Head and tail of the supported window — catches version-specific
        # behaviour in aiobotocore / anyio / asyncio without paying for the
        # middle versions.
        python: ["3.10", "3.13"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python }}
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Install nox
        run: uv pip install --system nox
      - name: Verify Docker is available
        run: docker version
      - name: Pre-pull kinesis-mock image
        run: docker pull ghcr.io/etspaceman/kinesis-mock:0.5.2
      - name: Fast integration lane
        run: nox -s integration-${{ matrix.python }} -- -m "integration and not slow"
      - name: Slow integration lane
        run: nox -s integration-${{ matrix.python }} -- -m "integration and slow"

  codecov:
    # Coverage gate is enforced per-Python in the `tests` matrix via
    # pyproject's fail_under=100 — this job only exists to publish the
    # numbers to Codecov for the badge + PR diff.
    name: Upload coverage to Codecov
    runs-on: ubuntu-latest
    needs: tests
    if: always() && needs.tests.result == 'success'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Download Python 3.12 coverage artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-3.12
          path: cov
      - name: Upload to Codecov
        uses: codecov/codecov-action@cddd853df119a48c5be31a973f8cd97e12e35e16 # v6.0.1
        with:
          files: cov/coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
