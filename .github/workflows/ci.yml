name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v3
      - name: Install nox
        run: uv pip install --system nox
      - name: Run lint & typecheck
        run: nox -s lint typecheck

  tests:
    name: Tests (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - uses: astral-sh/setup-uv@v3
      - name: Install nox
        run: uv pip install --system nox
      - name: Run tests
        run: nox -s tests-${{ matrix.python }}
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python }}
          path: |
            coverage.xml
            .coverage.*
          if-no-files-found: ignore
          include-hidden-files: true

  integration:
    name: Integration tests (kinesis-mock)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v3
      - name: Install nox
        run: uv pip install --system nox
      - name: Verify Docker is available
        run: docker version
      - name: Pre-pull kinesis-mock image
        run: docker pull ghcr.io/etspaceman/kinesis-mock:0.5.2
      - name: Run integration tests (fast lane only)
        run: nox -s integration -- -m "integration and not slow"
      - name: Run slow integration tests
        run: nox -s integration -- -m "integration and slow"

  coverage-gate:
    name: Coverage gate (100%)
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v3
      - name: Install coverage
        run: uv pip install --system "coverage[toml]>=7"
      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
        with:
          path: coverage-artifacts
      - name: Combine coverage
        run: |
          find coverage-artifacts -name '.coverage.*' -exec cp {} . \;
          coverage combine || true
          coverage report --fail-under=100
          coverage xml -o merged-coverage.xml
      - name: Upload merged coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: merged-coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
