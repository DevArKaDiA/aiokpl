name: Publish

# Triggered by a GitHub Release. Going through the Release UI is the
# manual gate — there's no tag-push trigger so an accidental tag never
# publishes. Pipeline:
#   unit-tests (matrix) ──┐
#                         ├──► build ──► publish (env: pypi, OIDC)
#   integration ──────────┘

on:
  release:
    types: [published]

permissions: {}

jobs:
  unit-tests:
    name: Unit tests (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python }}
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Install nox
        run: uv pip install --system nox
      - name: Run unit tests with coverage
        run: nox -s tests-${{ matrix.python }}

  integration:
    name: Integration (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.13"]   # head + tail of the supported window
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python }}
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Install nox
        run: uv pip install --system nox
      - name: Verify Docker
        run: docker version
      - name: Pre-pull kinesis-mock
        run: docker pull ghcr.io/etspaceman/kinesis-mock:0.5.2
      - name: Fast integration lane
        run: nox -s integration-${{ matrix.python }} -- -m "integration and not slow"
      - name: Slow integration lane
        run: nox -s integration-${{ matrix.python }} -- -m "integration and slow"

  build:
    name: Build distribution
    needs: [unit-tests, integration]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: false

      - name: Verify tag matches pyproject + __init__ versions
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"
          PYPROJECT=$(uv run --no-project python -c "import tomllib,pathlib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")
          INIT=$(uv run --no-project python -c "import re,pathlib; print(re.search(r'__version__ = \"([^\"]+)\"', pathlib.Path('aiokpl/__init__.py').read_text()).group(1))")
          echo "tag=$TAG pyproject=$PYPROJECT __init__=$INIT"
          if [ "$TAG" != "$PYPROJECT" ] || [ "$TAG" != "$INIT" ]; then
            echo "::error::Version mismatch — tag '$TAG' must equal pyproject '$PYPROJECT' and __init__ '$INIT'"
            exit 1
          fi

      - name: Build sdist and wheel
        run: uv build

      - name: Inspect built artifacts
        run: |
          ls -la dist/
          uv run --with twine twine check --strict dist/*

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish to PyPI
    needs: [build]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/aiokpl/${{ github.event.release.tag_name }}
    permissions:
      id-token: write  # OIDC for Trusted Publishing
      contents: read
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI via OIDC
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
