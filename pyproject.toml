[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "aiokpl"
version = "0.0.1"
description = "Pure-Python async Kinesis producer. KPL-equivalent without a native daemon."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
authors = [{ name = "Juan F. Rojas" }]
keywords = ["kinesis", "aws", "async", "producer", "kpl"]
classifiers = [
  "Development Status :: 2 - Pre-Alpha",
  "Framework :: AsyncIO",
  "License :: OSI Approved :: Apache Software License",
  "Programming Language :: Python :: 3 :: Only",
]
dependencies = [
  "aiobotocore>=2.13",
  "sortedcontainers>=2.4",
]

[project.optional-dependencies]
dev = [
  "pytest>=8",
  "pytest-asyncio>=0.23",
  "moto>=5",
  "ruff>=0.6",
  "mypy>=1.10",
]

[tool.hatch.build.targets.wheel]
packages = ["aiokpl"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "SIM", "RUF"]
